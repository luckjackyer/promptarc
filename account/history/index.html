<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="robots" content="noindex,nofollow">
  <title>Generation History - PromptArc</title>
  <link rel="stylesheet" href="/style.css?v=20260608-launchpolish2">
</head>
<body data-page="account" data-account-view="history">
  <main class="account-shell account-workspace">
    <header class="account-topbar">
      <a class="account-brand" href="/">PromptArc</a>
      <nav class="account-nav" aria-label="Account navigation">
        <a href="/">Home</a>
        <a href="/generate/">Generate</a>
        <a href="/account/">Account</a>
        <a href="/pricing/">Pricing</a>
      </nav>
    </header>

    <section class="account-history-shell">
      <div class="account-history-head">
        <div>
          <p class="account-label">Generation history</p>
          <h1>Log in to view generation history.</h1>
        </div>
        <p class="account-status" data-account-status>Checking login status.</p>
      </div>

      <div class="account-history-grid" data-account-history>
        <p class="account-empty-state"><strong>Log in to sync generation history</strong><span>Generated images, prompts, ratios, and model details will appear in time order.</span></p>
      </div>

      <nav class="account-actions">
        <a href="/account/login/">Log in</a>
        <a href="/generate/">Open generator</a>
      </nav>
    </section>
  </main>
  <script src="/app.js?v=20260608-launchpolish2"></script>
</body>
</html>
