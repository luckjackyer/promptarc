<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="720" viewBox="0 0 1280 720" role="img" aria-labelledby="title desc">
  <title id="title">PromptArc Image Prompt Pack Cover</title>
  <desc id="desc">A warm editorial product cover for the PromptArc Image Prompt Pack.</desc>
  <defs>
    <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#fff7ef"/>
      <stop offset="0.5" stop-color="#f7efe4"/>
      <stop offset="1" stop-color="#ffd4c0"/>
    </linearGradient>
    <linearGradient id="card" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#1d3754"/>
      <stop offset="1" stop-color="#17120e"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="18" stdDeviation="24" flood-color="#1f1b18" flood-opacity="0.18"/>
    </filter>
  </defs>
  <rect width="1280" height="720" fill="url(#bg)"/>
  <circle cx="1080" cy="120" r="220" fill="#f45d22" opacity="0.14"/>
  <circle cx="140" cy="620" r="250" fill="#1d3754" opacity="0.11"/>
  <g filter="url(#shadow)">
    <rect x="76" y="78" width="1128" height="564" rx="42" fill="#fffaf3" stroke="#e2d6c7"/>
  </g>
  <g transform="translate(126 128)">
    <rect width="88" height="88" rx="24" fill="#f45d22"/>
    <text x="44" y="56" text-anchor="middle" fill="#fffaf3" font-family="Manrope, Arial, sans-serif" font-size="30" font-weight="800">PA</text>
    <text x="0" y="148" fill="#cf4510" font-family="IBM Plex Mono, Consolas, monospace" font-size="24" letter-spacing="1">PROMPTARC</text>
    <text x="0" y="228" fill="#1f1b18" font-family="Manrope, Arial, sans-serif" font-size="76" font-weight="800">Image Prompt</text>
    <text x="0" y="312" fill="#1f1b18" font-family="Manrope, Arial, sans-serif" font-size="76" font-weight="800">Pack</text>
    <text x="0" y="374" fill="#675f57" font-family="Manrope, Arial, sans-serif" font-size="28">50 AI image prompts for ads, posters, UI, characters, portraits, and style tests.</text>
    <g transform="translate(0 430)">
      <rect width="172" height="48" rx="24" fill="#1d3754"/>
      <text x="86" y="31" text-anchor="middle" fill="#fffaf3" font-family="Manrope, Arial, sans-serif" font-size="18" font-weight="700">Product ads</text>
      <rect x="188" width="122" height="48" rx="24" fill="#ffd4c0"/>
      <text x="249" y="31" text-anchor="middle" fill="#1f1b18" font-family="Manrope, Arial, sans-serif" font-size="18" font-weight="700">Posters</text>
      <rect x="326" width="94" height="48" rx="24" fill="#ffd4c0"/>
      <text x="373" y="31" text-anchor="middle" fill="#1f1b18" font-family="Manrope, Arial, sans-serif" font-size="18" font-weight="700">UI</text>
    </g>
  </g>
  <g transform="translate(840 142)" filter="url(#shadow)">
    <rect width="260" height="178" rx="28" fill="url(#card)"/>
    <rect x="26" y="26" width="98" height="126" rx="20" fill="#f45d22"/>
    <rect x="142" y="30" width="90" height="18" rx="9" fill="#fffaf3" opacity="0.9"/>
    <rect x="142" y="62" width="66" height="14" rx="7" fill="#ffd4c0" opacity="0.9"/>
    <rect x="142" y="98" width="84" height="42" rx="14" fill="#fffaf3" opacity="0.18"/>
  </g>
  <g transform="translate(768 356)" filter="url(#shadow)">
    <rect width="330" height="180" rx="30" fill="#fff4e5" stroke="#e2d6c7"/>
    <rect x="26" y="28" width="278" height="22" rx="11" fill="#1f1b18"/>
    <rect x="26" y="70" width="220" height="14" rx="7" fill="#675f57" opacity="0.8"/>
    <rect x="26" y="102" width="260" height="14" rx="7" fill="#675f57" opacity="0.58"/>
    <rect x="26" y="134" width="146" height="26" rx="13" fill="#f45d22"/>
  </g>
