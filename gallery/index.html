<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AI Image Prompt Gallery | PromptArc</title>
  <meta name="description" content="Browse AI image prompt examples for product ads, posters, UI mockups, infographics, typography, photography, portraits, characters, and style tests. Search, filter, preview, and copy what works.">
  <meta name="robots" content="index,follow">
  <meta property="og:title" content="AI Image Prompt Gallery | PromptArc">
  <meta property="og:description" content="A focused gallery page for browsing and copying AI image prompts.">
  <meta property="og:type" content="website">
  <meta property="og:url" content="https://www.promptarc.cc/gallery/">
  <meta property="og:image" content="https://www.promptarc.cc/assets/og-cover.svg">
  <meta name="twitter:card" content="summary_large_image">
  <link rel="canonical" href="https://www.promptarc.cc/gallery/">
  <link rel="alternate" hreflang="en" href="https://www.promptarc.cc/gallery/">
  <link rel="alternate" hreflang="zh-CN" href="https://www.promptarc.cc/zh/gallery/">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;700;800&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
  <link rel="icon" href="/assets/favicon.svg" type="image/svg+xml">
  <link rel="stylesheet" href="/style.css">
</head>
<body data-page="prompt-hub">
  <div class="prompt-page-shell">
    <header class="prompt-page-topbar">
      <a class="prompt-page-brand" href="/" aria-label="PromptArc home">
        <span class="prompt-page-logo">PA</span>
        <span><strong data-site-name>PromptArc</strong><small>AI image prompt library</small></span>
      </a>
      <nav class="prompt-page-nav" aria-label="Primary">
        <a href="/">Home</a>
        <a href="/gallery/" aria-current="page">Gallery</a>
        <details class="prompt-nav-menu">
          <summary>Categories</summary>
          <div class="prompt-nav-menu-panel">
            <button type="button" data-gallery-filter="all">All prompts</button>
            <button type="button" data-gallery-filter="product">Product ads</button>
            <button type="button" data-gallery-filter="poster">Posters</button>
            <button type="button" data-gallery-filter="ui">UI mockups</button>
            <button type="button" data-gallery-filter="infographic">Infographics</button>
            <button type="button" data-gallery-filter="typography">Typography</button>
            <button type="button" data-gallery-filter="photography">Photography</button>
            <button type="button" data-gallery-filter="character">Characters</button>
            <button type="button" data-gallery-filter="portrait">Portraits</button>
            <button type="button" data-gallery-filter="test">Style tests</button>
          </div>
        </details>
        <details class="prompt-nav-menu">
          <summary>View</summary>
          <div class="prompt-nav-menu-panel">
            <button type="button" data-gallery-sort>Sort: latest</button>
            <button type="button" data-random-gallery>Shuffle</button>
            <button type="button" data-show-saved-gallery>Saved only</button>
          </div>
        </details>
        <a href="/recommended-tools/">Monetization notes</a>
      </nav>
      <div class="prompt-page-lang" aria-label="Language switch">
        <span class="is-active">EN</span>
        <a href="/zh/gallery/">涓枃</a>
      </div>
    </header>

    <main class="prompt-page-main">
      <section class="prompt-page-hero">
        <div class="prompt-page-copy">
          <p class="prompt-page-kicker">Visual prompt examples</p>
          <h1>Browse the full image prompt gallery.</h1>
          <p class="prompt-page-summary">Search by outcome, open a preview, and copy the prompt structure you want to study or reuse.</p>

          <label class="prompt-search-bar" for="gallery-search">
            <span>Search prompts</span>
            <input id="gallery-search" type="search" placeholder="Search product, infographic, photo, poster..." data-gallery-search>
            <strong aria-hidden="true">鈱?/strong>
          </label>

        </div>
      </section>

      <section class="prompt-page-toolbar">
        <span data-gallery-count>54 examples shown</span>
      </section>

      <section class="prompt-grid-panel">
        <div id="gallery-grid" class="prompt-card-grid" data-gallery-grid></div>
      </section>
    </main>
  </div>

  <script src="/config.js"></script>
  <script src="/gallery/gallery-data.js"></script>
  <script src="/app.js"></script>
</body>
</html>
