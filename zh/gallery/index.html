<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AI 图像提示词图库 | PromptArc</title>
  <meta name="description" content="浏览 AI 图像提示词案例，按产品广告、海报、UI、角色、人像和风格测试搜索、筛选、预览和复制提示词。">
  <meta name="robots" content="index,follow">
  <meta property="og:title" content="AI 图像提示词图库 | PromptArc">
  <meta property="og:description" content="一个更聚焦的图库页面，用来快速查找并复制 AI 图像提示词。">
  <meta property="og:type" content="website">
  <meta property="og:url" content="https://www.promptarc.cc/zh/gallery/">
  <meta property="og:image" content="https://www.promptarc.cc/assets/og-cover.svg">
  <meta name="twitter:card" content="summary_large_image">
  <link rel="canonical" href="https://www.promptarc.cc/zh/gallery/">
  <link rel="alternate" hreflang="en" href="https://www.promptarc.cc/gallery/">
  <link rel="alternate" hreflang="zh-CN" href="https://www.promptarc.cc/zh/gallery/">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;700;800&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
  <link rel="icon" href="/assets/favicon.svg" type="image/svg+xml">
  <link rel="stylesheet" href="/style.css">
</head>
<body data-page="prompt-hub">
  <div class="prompt-page-shell">
    <header class="prompt-page-topbar">
      <a class="prompt-page-brand" href="/zh/" aria-label="PromptArc 中文首页">
        <span class="prompt-page-logo">PA</span>
        <span><strong data-site-name>PromptArc</strong><small>AI 图像提示词库</small></span>
      </a>
      <nav class="prompt-page-nav" aria-label="主导航">
        <a href="/zh/">首页</a>
        <a href="/zh/gallery/" aria-current="page">图库</a>
        <a href="/zh/tool/?mode=image">工具</a>
        <a href="/zh/image-prompt-pack/">提示词包</a>
      </nav>
      <div class="prompt-page-lang" aria-label="语言切换">
        <a href="/gallery/">EN</a>
        <span class="is-active">中文</span>
      </div>
    </header>

    <main class="prompt-page-main">
      <section class="prompt-page-hero">
        <div class="prompt-page-copy">
          <p class="prompt-page-kicker">视觉提示词案例</p>
          <h1>浏览完整的图像提示词图库。</h1>
          <p class="prompt-page-summary">按结果找提示词，打开预览，复制结构，再把它放进工具里继续改写。</p>

          <label class="prompt-search-bar" for="gallery-search">
            <span>搜索提示词</span>
            <input id="gallery-search" type="search" placeholder="搜索 product、portrait、UI、poster..." data-gallery-search>
            <strong aria-hidden="true">⌕</strong>
          </label>

          <div class="prompt-page-actions">
            <a class="prompt-page-button primary" href="/zh/tool/?mode=image">用工具改写</a>
            <a class="prompt-page-button secondary" href="/zh/image-prompt-pack/">领取提示词包</a>
          </div>

          <div class="prompt-page-tags" aria-label="常用标签">
            <button type="button" data-gallery-filter="all">全部</button>
            <button type="button" data-gallery-filter="product">产品广告</button>
            <button type="button" data-gallery-filter="poster">海报设计</button>
            <button type="button" data-gallery-filter="ui">UI Mockup</button>
            <button type="button" data-gallery-filter="character">角色设计</button>
            <button type="button" data-gallery-filter="portrait">人像摄影</button>
            <button type="button" data-gallery-filter="test">风格测试</button>
          </div>
        </div>

        <aside class="prompt-page-sidebar" aria-label="快速入口">
          <div class="prompt-sidebar-card">
            <p>PromptArc 图库</p>
            <strong>24 个精选提示词案例</strong>
            <span>让搜索、复制和复用这条路径更直接。</span>
          </div>
          <button type="button" class="prompt-sidebar-link" data-gallery-filter="product">产品广告 <strong>7</strong></button>
          <button type="button" class="prompt-sidebar-link" data-gallery-filter="poster">海报设计 <strong>2</strong></button>
          <button type="button" class="prompt-sidebar-link" data-gallery-filter="portrait">人像摄影 <strong>2</strong></button>
          <button type="button" class="prompt-sidebar-link" data-gallery-filter="test">风格测试 <strong>7</strong></button>
        </aside>
      </section>

      <section class="prompt-page-toolbar">
        <span data-gallery-count>24 个案例</span>
        <div class="prompt-toolbar-actions">
          <button class="prompt-toolbar-button" type="button" data-gallery-sort>排序：最新</button>
          <button class="prompt-toolbar-button" type="button" data-random-gallery>随机换一批</button>
          <button class="prompt-toolbar-button" type="button" data-copy-visible-prompts>复制当前可见</button>
          <button class="prompt-toolbar-button" type="button" data-show-saved-gallery>只看收藏</button>
        </div>
      </section>

      <section class="prompt-grid-panel">
        <div id="gallery-grid" class="prompt-card-grid" data-gallery-grid></div>
      </section>
    </main>
  </div>

  <script src="/config.js"></script>
  <script src="/gallery/gallery-data.js"></script>
  <script src="/app.js"></script>
</body>
</html>
