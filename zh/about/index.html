      <h1>PromptArc 是面向图片生成的 AI 创作工作台。</h1>
      <p>PromptArc 面向创作者、营销人、创业者和设计师，帮助用户把一个画面想法变成可以比较、查看、下载和复用的生成图片。</p>
      <p>当前产品方向很明确：图片是产品本身。生成器、图库、价格页和会员中心都应该服务于同一个目标，让用户知道能生成什么，并更有信心开始生成。</p>
