<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>账户 | PromptArc</title>
  <meta name="description" content="PromptArc 账户工作台，用于后续集中管理生成历史、额度、下载和会员功能。">
  <meta name="robots" content="noindex,follow">
  <link rel="canonical" href="https://www.promptarc.cc/zh/account/">
  <link rel="alternate" hreflang="en" href="https://www.promptarc.cc/account/">
  <link rel="alternate" hreflang="zh-CN" href="https://www.promptarc.cc/zh/account/">
  <link rel="icon" href="/assets/favicon.svg" type="image/svg+xml">
  <link rel="stylesheet" href="/style.css">
</head>
<body data-page="prompt-hub">
  <div class="prompt-page-shell">
    <header class="prompt-page-topbar">
      <a class="prompt-page-brand" href="/zh/">
        <span class="prompt-page-logo">PA</span>
        <span><strong data-site-name>PromptArc</strong><small>AI 图像提示词库</small></span>
      </a>
      <nav class="prompt-page-nav" aria-label="主导航">
        <a href="/zh/">首页</a>
        <a href="/zh/gallery/">图库</a>
        <a href="/zh/generate/">生成图片</a>
        <a href="/zh/account/" aria-current="page">账户</a>
      </nav>
      <div class="prompt-page-lang" aria-label="语言切换">
        <a href="/account/">EN</a>
        <span class="is-active">中文</span>
      </div>
    </header>

    <main class="prompt-page-main">
      <section class="prompt-subhero prompt-generator-hero">
        <p class="prompt-page-kicker">账户工作台</p>
        <h1>跨设备保存你的生图历史。</h1>
        <p>PromptArc 账户会把生成历史、额度、下载和后续会员权益集中管理。当前测试版先保留本地浏览器历史，避免首次使用被登录打断。</p>
        <div class="button-row">
          <a class="button" href="/zh/account/history/">打开本地历史</a>
          <a class="button ghost" href="/zh/generate/">生成图片</a>
        </div>
      </section>

      <section class="account-grid">
        <article class="prompt-panel">
          <h2>当前测试版</h2>
          <p>最近生成的图片会先保存在当前浏览器里，保证首次使用足够快，不强制登录。</p>
        </article>
        <article class="prompt-panel">
          <h2>下一步账户层</h2>
          <p>D1 持久化稳定后，再接邮箱魔法链接或 Google 登录，把匿名历史绑定到真实账户。</p>
        </article>
        <article class="prompt-panel">
          <h2>会员模块准备</h2>
          <p>额度、永久历史、批量下载、账单入口和公开图库投稿，会在用量追踪稳定后继续接入。</p>
        </article>
      </section>
    </main>
  </div>

  <script src="/config.js"></script>
  <script src="/app.js"></script>
</body>
</html>
