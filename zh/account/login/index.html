<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="robots" content="noindex,nofollow">
  <title>登录 PromptArc</title>
  <link rel="stylesheet" href="/style.css?v=20260607-launchcache1">
</head>
<body data-page="account" data-account-view="login">
  <main class="account-shell">
    <section class="account-panel">
      <a class="account-brand" href="/zh/">PromptArc</a>
      <h1>登录后生成图片</h1>
      <p>会员系统上线后，所有生图都需要登录。我们会保留你的提示词、图片历史和剩余额度。</p>
      <form class="account-login-form" data-account-login-form>
        <label>
          <span>邮箱</span>
          <input type="email" name="email" autocomplete="email" required>
        </label>
        <button type="submit">发送登录链接</button>
      </form>
      <p class="account-status" data-account-status>输入邮箱后，我们会发送登录链接。</p>
      <p class="account-hint">第一版使用邮箱登录，不需要密码。</p>
    </section>
  </main>
  <script src="/app.js?v=20260607-launchcache1"></script>
</body>
</html>
