<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="robots" content="noindex,nofollow">
  <title>登录 PromptArc</title>
  <link rel="stylesheet" href="/style.css?v=20260614-generatefold1">
</head>
<body data-page="account" data-account-view="login">
  
    
  

  

  

  

  <header class="site-global-nav" data-site-global-nav>
      <a class="site-global-brand" href="/zh/" aria-label="PromptArc 首页">
        <span class="site-global-logo">PA</span>
        <strong class="site-global-wordmark">PromptArc</strong>
      </a>
      <nav class="site-global-links" aria-label="主导航">
        <a href="/zh/generate-image-first/" data-nav-key="generate">生成</a>
        <a href="/zh/gallery/" data-nav-key="gallery">图库</a>
        <a href="/zh/pricing/" data-nav-key="pricing">价格</a>
        <a href="/zh/account/" data-nav-key="account" aria-current="page">账户</a>
      </nav>
      <a class="site-global-lang" href="/account/login/" aria-label="语言切换: English">
        <span>EN</span>
      </a>
    </header>
<main class="account-shell account-workspace">
<section class="account-auth-shell">
      <div class="account-auth-copy">
        <p class="account-label">登录账户</p>
        <h1>登录后才能生成图片。</h1>
        <p>PromptArc 会把生成额度、提示词和图片历史绑定到你的账户。登录后再开始生成，结果不会丢。</p>
      </div>

      <form class="account-auth-card account-login-form" data-account-login-form>
        <label>
          <span>邮箱</span>
          <input type="email" name="email" autocomplete="email" placeholder="you@example.com" required>
        </label>
        <button type="submit">发送登录链接</button>
        <p class="account-status" data-account-status>输入邮箱后，我们会发送登录链接。</p>
        <p class="account-hint">使用邮箱登录，不需要密码。</p>
      </form>

      <aside class="account-auth-note" aria-label="登录后可用功能">
        <span>登录后可用</span>
        <ul>
          <li>检查剩余额度</li>
          <li>保存生成历史</li>
          <li>继续回到生成器</li>
        </ul>
        <a href="/zh/account/">返回会员中心</a>
      </aside>
    </section>
  </main>
  <script src="/app.js?v=20260614-generatefold1"></script>
</body>
</html>
