<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AI 图像提示词生成器 | PromptArc</title>
  <meta name="description" content="为产品广告、海报、UI、角色、人像和风格测试生成更清晰的 AI 图像提示词。">
  <meta name="robots" content="index,follow">
  <meta property="og:title" content="AI 图像提示词生成器 | PromptArc">
  <meta property="og:description" content="把一个视觉想法整理成结构清晰、可复制的图像提示词。">
  <meta property="og:type" content="website">
  <meta property="og:url" content="https://www.promptarc.cc/zh/tool/">
  <meta property="og:image" content="https://www.promptarc.cc/assets/og-cover.svg">
  <link rel="canonical" href="https://www.promptarc.cc/zh/tool/">
  <link rel="alternate" hreflang="en" href="https://www.promptarc.cc/tool/">
  <link rel="alternate" hreflang="zh-CN" href="https://www.promptarc.cc/zh/tool/">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;700;800&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
  <link rel="icon" href="/assets/favicon.svg" type="image/svg+xml">
  <link rel="stylesheet" href="/style.css">
</head>
<body data-page="prompt-hub">
  <div class="prompt-page-shell">
    <header class="prompt-page-topbar">
      <a class="prompt-page-brand" href="/zh/">
        <span class="prompt-page-logo">PA</span>
        <span><strong data-site-name>PromptArc</strong><small>AI 图像提示词库</small></span>
      </a>
      <nav class="prompt-page-nav" aria-label="主导航">
        <a href="/zh/">首页</a>
        <a href="/zh/gallery/">图库</a>
        <a href="/zh/tool/" aria-current="page">工具</a>
        <a href="/zh/image-prompt-pack/">提示词包</a>
        <a href="/zh/recommended-tools/">工具推荐</a>
      </nav>
      <div class="prompt-page-lang" aria-label="语言切换">
        <a href="/tool/">EN</a>
        <span class="is-active">中文</span>
      </div>
    </header>

    <main class="prompt-page-main">
      <section class="prompt-subhero">
        <p class="prompt-page-kicker">Prompt builder</p>
        <h1>把视觉想法整理成可用的图像提示词。</h1>
        <p>选择任务，补充主体、场景、风格和限制条件，然后复制结构化提示词。</p>
      </section>

      <section class="prompt-workspace">
        <form id="prompt-form" class="prompt-panel prompt-form">
          <div class="preset-rail clean-preset-rail">
            <button class="quick-preset" type="button" data-load-preset="image-product">产品广告</button>
            <button class="quick-preset" type="button" data-load-preset="image-poster">海报</button>
            <button class="quick-preset" type="button" data-load-preset="image-ui">UI Mockup</button>
            <button class="quick-preset" type="button" data-load-preset="image-character">角色</button>
          </div>

          <label for="workflow">视觉任务</label>
          <select id="workflow" name="workflow">
            <option value="image-product">产品广告</option>
            <option value="image-poster">海报设计</option>
            <option value="image-ui">UI Mockup</option>
            <option value="image-character">角色设计</option>
            <option value="image-portrait">人像摄影</option>
            <option value="image-test">风格测试</option>
          </select>

          <label for="audience">主体</label>
          <input id="audience" name="audience" type="text" placeholder="例如：琥珀色香水瓶，放在石材台面上" required>

          <label for="goal">场景或目标</label>
          <input id="goal" name="goal" type="text" placeholder="例如：高端电商首图，画面留出文案空间" required>

          <label for="context">风格与构图说明</label>
          <textarea id="context" name="context" rows="4" placeholder="光线、镜头、情绪、背景、材质、布局..."></textarea>

          <label for="tone">视觉气质</label>
          <select id="tone" name="tone">
            <option value="clean commercial photography">干净商业摄影</option>
            <option value="cinematic and editorial">电影感编辑风</option>
            <option value="minimal premium design">极简高级设计</option>
            <option value="playful colorful campaign">彩色活泼广告</option>
          </select>

          <label for="format">输出格式</label>
          <select id="format" name="format">
            <option value="square 1:1 image">方图 1:1</option>
            <option value="vertical 4:5 social image">竖版社媒图 4:5</option>
            <option value="wide 16:9 banner">横幅 16:9</option>
            <option value="mobile screen mockup">手机界面 mockup</option>
          </select>

          <label for="constraints">限制条件</label>
          <textarea id="constraints" name="constraints" rows="4" placeholder="不要乱码文字，不要多余物体，不要变形手指，标签保持清晰..."></textarea>

          <button class="prompt-page-button primary" type="submit">生成提示词</button>
        </form>

        <aside class="prompt-panel result-card">
          <div class="result-header">
            <div>
              <p class="prompt-page-kicker">Output</p>
              <h2>生成结果</h2>
            </div>
            <button class="prompt-toolbar-button" type="button" data-copy-target="#prompt-output">复制</button>
          </div>
          <pre id="prompt-output" class="code-block">填写字段后，生成一个结构化图像提示词。</pre>
          <ul id="prompt-checklist" class="checklist compact-checklist">
            <li>主体和视觉任务清楚</li>
            <li>场景、光线和构图具体</li>
            <li>包含输出格式和限制条件</li>
          </ul>
        </aside>
      </section>
    </main>
  </div>

  <script src="/config.js"></script>
  <script src="/app.js"></script>
</body>
</html>
