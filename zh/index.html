<body data-page="home-canvas">
  <div class="home-app-shell">
    <aside class="home-rail" aria-label="核心导航">
      <a class="home-rail-brand" href="/zh/" aria-label="PromptArc 中文首页">
        <span class="home-rail-logo">PA</span>
      </a>
      <nav class="home-rail-nav">
        <a href="/zh/" aria-current="page">首页</a>
        <a href="/zh/gallery/">图库</a>
        <a href="/zh/generate/">生图</a>
      </nav>
      <div class="home-rail-foot" aria-hidden="true"></div>
    </aside>

    <div class="home-stage-shell">
      <header class="home-topbar">
        <div class="home-topbar-copy">
          <span class="home-topbar-kicker">PromptArc Image</span>
          <strong>图片生成主场</strong>
        </div>
        <div class="home-topbar-actions">
          <div class="prompt-page-lang" aria-label="语言切换">
            <select class="prompt-page-lang-select" aria-label="语言切换" onchange="if (this.value) window.location.href = this.value;">
              <option value="" selected>中文</option>
              <option value="/">EN</option>
            </select>
          </div>
        </div>
      </header>

      <main class="home-stage-main">
        <section class="home-hero-stage" aria-label="首页首屏">
          <div class="home-hero-backdrop"></div>
          <div class="home-hero-glow home-hero-glow-a"></div>
          <div class="home-hero-glow home-hero-glow-b"></div>

          <div class="home-hero-copy">
            <h1>输入想法 立即生图</h1>
            <p class="home-hero-summary">直接输入你想要的画面，先生成，再回到图库继续挑灵感和做迭代。</p>
          </div>

          <form id="image-generator-form" class="home-hero-console">
            <div class="home-console-side">
              <button class="home-console-side-button" type="button" aria-label="上传参考图"></button>
            </div>

            <div class="home-console-main">
              <div class="home-console-head">
                <div class="home-console-meta">
                  <span>GPT Image 2</span>
                </div>
              </div>

              <label class="home-console-input">
                <span class="home-console-label">描述你想生成的图片内容</span>
                <textarea name="prompt" placeholder="例如：高级护肤品首图，黑色岩板台面，柔和晨光，水珠高光，极简商业广告，禁止文字和 logo..." required></textarea>
              </label>
              <input type="hidden" name="ratio" value="1:1 square" data-home-ratio-input>
              <input type="hidden" name="resolution" value="1k" data-home-resolution-input>
              <input type="hidden" name="generationCount" value="1">
              <input type="hidden" name="guardrails" value="构图干净，光线稳定，不要水印，不要品牌 logo，不要多余文字。">

              <div class="home-console-toolbar">
                <span class="home-console-summary">文生图</span>
                <span class="home-console-divider"></span>
                <details class="home-console-picker" data-home-resolution-picker>
                  <summary class="home-console-summary" data-home-resolution-label>1K 高清</summary>
                  <div class="home-console-picker-menu">
                    <button type="button" data-home-resolution-option data-value="1k" data-label="1K 高清">1K 高清</button>
                    <button type="button" data-home-resolution-option data-value="2k" data-label="2K 高清">2K 高清</button>
                    <button type="button" data-home-resolution-option data-value="4k" data-label="4K 高清">4K 高清</button>
                  </div>
                </details>
                <span class="home-console-divider"></span>
                <details class="home-console-picker" data-home-ratio-picker>
                  <summary class="home-console-summary" data-home-ratio-label>1:1 方图</summary>
                  <div class="home-console-picker-menu">
                    <button type="button" data-home-ratio-option data-value="1:1 square" data-label="1:1 方图">1:1 方图</button>
                    <button type="button" data-home-ratio-option data-value="4:3 landscape" data-label="4:3 横图">4:3 横图</button>
                    <button type="button" data-home-ratio-option data-value="3:4 portrait" data-label="3:4 竖图">3:4 竖图</button>
                    <button type="button" data-home-ratio-option data-value="2:3 portrait" data-label="2:3 竖图">2:3 竖图</button>
                    <button type="button" data-home-ratio-option data-value="4:5 portrait" data-label="4:5 竖图">4:5 竖图</button>
                    <button type="button" data-home-ratio-option data-value="9:16 portrait" data-label="9:16 手机竖图">9:16 手机竖图</button>
                    <button type="button" data-home-ratio-option data-value="16:9 landscape" data-label="16:9 横图">16:9 横图</button>
                  </div>
                </details>
                <button class="home-console-submit" type="submit">开始生图</button>
              </div>
            </div>
          </form>

          <div class="home-console-shortcuts" aria-label="快捷入口">
            <a href="/zh/generate/">进入完整生图台</a>
            <a href="/zh/gallery/">查看图像案例</a>
          </div>

          <div class="home-generator-result" data-generator-result hidden></div>
          <pre id="generator-output" class="generator-output-buffer" hidden></pre>
        </section>

        <section class="home-discovery-panel">
          <div class="home-discovery-head">
            <div>
              <h2>热门创意精选</h2>
            </div>
            <a href="/zh/gallery/">进入完整图库</a>
          </div>
          <div class="home-discovery-grid" id="gallery-grid" data-gallery-grid data-gallery-limit="6"></div>
        </section>
      </main>
    </div>
  </div>
